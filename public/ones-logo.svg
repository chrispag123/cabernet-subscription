<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a1a" stroke="#d4a574" stroke-width="3"/>
  
  <!-- Wine glass outline -->
  <g>
    <!-- Glass bowl -->
    <path d="M 70 60 Q 70 90 85 110 L 115 110 Q 130 90 130 60 Z" 
          fill="none" stroke="#d4a574" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Stem -->
    <line x1="100" y1="110" x2="100" y2="140" stroke="#d4a574" stroke-width="1.5"/>
    
    <!-- Base -->
    <ellipse cx="100" cy="145" rx="18" ry="5" fill="none" stroke="#d4a574" stroke-width="1.5"/>
  </g>
  
  <!-- ONES text - vertical -->
  <text x="100" y="65" font-size="18" font-weight="bold" fill="#d4a574" 
        font-family="Georgia, serif" text-anchor="middle" letter-spacing="1">O</text>
  <text x="100" y="85" font-size="18" font-weight="bold" fill="#d4a574" 
        font-family="Georgia, serif" text-anchor="middle" letter-spacing="1">N</text>
  <text x="100" y="105" font-size="18" font-weight="bold" fill="#d4a574" 
        font-family="Georgia, serif" text-anchor="middle" letter-spacing="1">E</text>
  <text x="100" y="125" font-size="18" font-weight="bold" fill="#d4a574" 
        font-family="Georgia, serif" text-anchor="middle" letter-spacing="1">S</text>
  
  <!-- Plus sign -->
  <text x="115" y="80" font-size="16" font-weight="bold" fill="#d4a574" 
        font-family="Georgia, serif">+</text>
</svg>
